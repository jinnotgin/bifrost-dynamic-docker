name: Build Bifrost dynamic Docker image

on:
  workflow_dispatch:
    inputs:
      bifrost_version:
        description: "Bifrost transport version, e.g. 1.4.24"
        required: true
        default: "1.4.24"
      go_builder_image:
        description: "Go builder image, e.g. golang:1.26.2-alpine3.23"
        required: true
        default: "golang:1.26.2-alpine3.23"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jinnotgin/bifrost-dynamic-alpine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v5

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.bifrost_version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=transports/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dynamic-alpine
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BIFROST_VERSION=${{ steps.version.outputs.version }}
            BIFROST_TAG=${{ steps.version.outputs.tag }}
            GO_BUILDER_IMAGE=${{ github.event.inputs.go_builder_image }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=bifrost-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=bifrost-${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.bifrost_version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"

          docker buildx imagetools create \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:v${VERSION}-amd64" \
            "${IMAGE}:v${VERSION}-arm64"

      - name: Inspect manifest
        shell: bash
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}"
