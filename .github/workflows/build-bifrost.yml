name: Build Bifrost dynamic Docker image

on:
  workflow_dispatch:
    inputs:
      bifrost_version:
        description: "Bifrost version, e.g. 1.4.24"
        required: true
        default: "1.4.24"
      platforms:
        description: "Docker platforms"
        required: true
        default: "linux/amd64,linux/arm64"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bifrost-dynamic-alpine

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v5

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.bifrost_version }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=transports/v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: contains(github.event.inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dynamic-alpine
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          build-args: |
            BIFROST_VERSION=${{ steps.version.outputs.version }}
            BIFROST_TAG=${{ steps.version.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
